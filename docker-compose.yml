services:
  api:
    build: .
    container_name: webhook-api
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:postgres@db:5432/webhook_pipeline

  db:
    image: postgres:17
    container_name: webhook-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook_pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
